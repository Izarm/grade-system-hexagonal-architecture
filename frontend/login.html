<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h2>Iniciar sesión</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Correo electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña" required><br><br>
        <button type="submit">Ingresar</button>
    </form>
    <div id="resultado"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('resultado').innerHTML = `
                        <p style="color: green;">✅ Login exitoso</p>
                        <p>Token: ${data.token}</p>
                        <p>Usuario: ${data.user.name} (${data.user.role})</p>
                    `;
                    // Aquí puedes guardar el token en localStorage, redirigir, etc.
                } else {
                    document.getElementById('resultado').innerHTML = `<p style="color: red;">❌ Error: ${data.message}</p>`;
                }
            } catch (error) {
                document.getElementById('resultado').innerHTML = `<p style="color: red;">Error de conexión: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
